                        baseTag.id = 'dynamic-base-tag';
                        const existingBase = head.querySelector('base');
                        if (existingBase) {
                            head.insertBefore(baseTag, existingBase);
                        } else {
                            head.prepend(baseTag);
                        }
                    }
                    try {
                        const finalHref = href.startsWith('http') ? href : new URL(href, window.location.origin).href;
                        baseTag.href = finalHref.endsWith('/') ? finalHref : finalHref + '/';
                        console.log('Set <base> tag href:', baseTag.href);
                    } catch (e) {
                        this.handleGenericError(e, "Error setting base tag href", "Base Tag Handling", { inputHref: href });
                        if (baseTag) baseTag.remove();
                    }
                } else {
                    if (baseTag) {
                        baseTag.remove();
                        console.log('Removed <base> tag');
                    }
                }
            },
            handleApiError(error, contextMessageKey, details = {}) {
                console.error(`${contextMessageKey}:`, error, "Details:", details);
                let userMessage, errorCode = error?.status, shouldLogout = false;
                let messageOptions = { context: i18next.t(contextMessageKey), code: errorCode, message: error?.message || i18next.t('errors.unknownError'), path: details.path || 'N/A', slug: details.slug || 'N/A', dirPath: details.dirPath || 'N/A' };
                if (errorCode) {
                    switch (errorCode) {
                        case 401: userMessage = i18next.t('errors.authError', messageOptions); shouldLogout = true; break;
                        case 403: userMessage = i18next.t('errors.permissionError', messageOptions); if (error.message?.toLowerCase().includes("rate limit exceeded")) userMessage += i18next.t('errors.rateLimit'); else if (error.message?.toLowerCase().includes("resource not accessible") || error.message?.toLowerCase().includes("repository access denied")) userMessage += i18next.t('errors.repoAccessDenied'); break;
                        case 404: userMessage = i18next.t('errors.notFoundError', messageOptions); break;
                        case 409: userMessage = i18next.t('errors.conflictError', messageOptions); break;
                        case 422: userMessage = i18next.t('errors.unprocessableError', messageOptions); break;
                        default: userMessage = i18next.t('errors.genericApiError', messageOptions);
                    }
                } else if (error?.message?.toLowerCase().includes('fetch') || error instanceof TypeError && error.message.includes('NetworkError')) {
                    userMessage = i18next.t('errors.contextualNetworkError', { context: i18next.t(contextMessageKey) });
                } else { userMessage = i18next.t('errors.unexpectedErrorContext', messageOptions); }
                UIManager.updateStatus(`${userMessage}`, true);
                UIManager.setEditorSaving(false); UIManager.setRepoLoading(false); UIManager.setFileListLoading(false, AppState.currentPath);
                if (shouldLogout) { this.handleLogout(); }
            },
            handleGenericError(error, userMessageOrKey, context = "General Error", details = {}) {
                console.error(`${context}:`, error, "Details:", details);
                let message = '';
                if (userMessageOrKey) {
                    message = i18next.exists(userMessageOrKey) ? i18next.t(userMessageOrKey, details) : String(userMessageOrKey);
                } else {
                    message = i18next.t('errors.unknownError', { message: error?.message || 'Unknown' });
                }
                UIManager.updateStatus(message, true);
            },
            async loadDraftStatus() {
                AppState.draftPathsSet.clear();
                if (UIManager.elements.draftFilterContainer) {
                    UIManager.elements.draftFilterContainer.classList.add('hidden');
                }
                if (!AppState.octokit || !AppState.owner || !AppState.repo) {
                    console.warn("Cannot load draft status: Not authenticated or repo not set.");
                    return;
                }
                const draftFilePath = 'drafts.json';
                try {
                    const { data } = await AppState.octokit.request('GET /repos/{owner}/{repo}/contents/{path}', {
                        owner: AppState.owner,
                        repo: AppState.repo,
                        path: draftFilePath,
                        ref: AppState.branch,
                        headers: { 'If-None-Match': '' }
                    });
                    if (data && data.type === 'file' && data.content) {
                        const decodedContent = Utils.b64DecodeUnicode(data.content);
                        let draftPaths = null;
                        try {
                            draftPaths = JSON.parse(decodedContent);
                        } catch (parseError) {
                            this.handleGenericError(parseError, i18next.t('errors.apiError', { message: `Failed to parse ${draftFilePath}: ${parseError.message}` }), "Draft Status Parsing");
                            AppState.draftPathsSet.clear();
                            return;
                        }
                        if (Array.isArray(draftPaths)) {
                            AppState.draftPathsSet = new Set(draftPaths.map(p => Utils.normalizePath(p)));
                            console.log(`Loaded ${AppState.draftPathsSet.size} draft paths from ${draftFilePath}.`);
                            if (UIManager.elements.draftFilterContainer) {
                                UIManager.elements.draftFilterContainer.classList.remove('hidden');
                            }
                        } else {
                            console.warn(`${draftFilePath} content is not a valid JSON array.`);
                            AppState.draftPathsSet.clear();
                        }
                    } else {
                        console.warn(`Could not load or parse ${draftFilePath}. It might be a directory or content is missing.`);
                        AppState.draftPathsSet.clear();
                    }
                } catch (error) {
                    if (error.status === 404) {
                        console.log(`${draftFilePath} not found. Assuming no drafts (normal for some users/policies).`);
                    } else {
                        this.handleApiError(error, `Failed to load ${draftFilePath}`, { path: draftFilePath });
                    }
                    AppState.draftPathsSet.clear();
                    console.log('Cleared local draft set due to API error, file not found/policy, or invalid content.');
                }
            },
            handleLocalLink(href, markdownFilePath, localAssetSubdir) {
                const markdownDir = Utils.getDirname(markdownFilePath);
                const normalizedSubdir = Utils.normalizePath(localAssetSubdir);
                const relativePath = href.startsWith('./') ? href.substring(2) : href;
                return Utils.normalizePath(Utils.joinPaths(markdownDir, normalizedSubdir, relativePath));
            },
            handleGlobalLink(href, markdownFilePath, globalRootDir, globalAssetSubpath) {
                const normalizedRootDir = Utils.normalizePath(globalRootDir);
                const normalizedAssetSubpath = Utils.normalizePath(globalAssetSubpath);
                const baseBrowsePath = Utils.normalizePath(UserSettings.BASE_BROWSE_PATH);
                const markdownDir = Utils.getDirname(markdownFilePath);
                const postSlug = Utils.getSlugFromFilename(markdownFilePath);
                let subFolderPath = '';
                if (markdownDir.startsWith(baseBrowsePath) && markdownDir.length > baseBrowsePath.length && markdownDir !== baseBrowsePath) {
                    subFolderPath = markdownDir.substring(baseBrowsePath.length + 1);
                }
                let webPathPrefix = '/';
                if (UserSettings.OMIT_GLOBAL_ROOT_DIR_FROM_URL) {
                    webPathPrefix = '/' + Utils.normalizePath(Utils.joinPaths(normalizedAssetSubpath, subFolderPath, postSlug)) + '/';
                } else {
                    webPathPrefix = '/' + Utils.normalizePath(Utils.joinPaths(normalizedRootDir, normalizedAssetSubpath, subFolderPath, postSlug)) + '/';
                }
                webPathPrefix = webPathPrefix.replace(/\/+/g, '/');
                if (href.startsWith(webPathPrefix)) {
                    const assetFilename = Utils.getBasename(href);
                    const githubPath = Utils.normalizePath(Utils.joinPaths(normalizedRootDir, normalizedAssetSubpath, subFolderPath, postSlug, assetFilename));
                    return githubPath;
                }
                return null;
            },
            parseManagedUploadLinks(markdownBody, markdownFilePath = null) {
                const links = new Set();
                if (!markdownBody || typeof marked === 'undefined' || !markdownFilePath) return links;
                const isAssetStrategyLocal = UserSettings.ASSET_STRATEGY === 'local';
                const isEditingBundleFile = Utils.isAnyBundlePath(markdownFilePath);
                const markdownLinkRegex = /(!?\[[^\]]*\]\()([^)]+)\)/g;
                let match;
                while ((match = markdownLinkRegex.exec(markdownBody)) !== null) {
                    let href = match[2] ? String(match[2]).trim() : null;
                    if (!href) continue;
                    const originalHref = href;
                    try {
                        href = Utils.cleanUrl(href);
                        let githubPath = null;
                        const isPotentiallyRelative = !href.startsWith('/') && !href.startsWith('http') && !href.startsWith('#') && !href.startsWith('mailto:') && !href.includes(':');
                        if (isPotentiallyRelative && isEditingBundleFile) {
                            githubPath = this.handleLocalLink(href, markdownFilePath, UserSettings.LOCAL_ASSET_SUBDIR);
                        } else if (href.startsWith('/') && !isEditingBundleFile && !isAssetStrategyLocal) {
                            githubPath = this.handleGlobalLink(href, markdownFilePath, UserSettings.GLOBAL_ROOT_DIR, UserSettings.GLOBAL_ASSET_SUBPATH);
                        }
                        if (githubPath) links.add(githubPath);
                    } catch (e) { console.warn(`Could not process href: ${originalHref}`, e); }
                }
                return links;
            },
            determineSaveTarget(isUpdate, newSlug, originalPath, currentDirectoryPath, userSettings) {
                let targetPath, targetFilename, isTargetLocalActual;
                const isConfigAssetStrategyLocal = userSettings.ASSET_STRATEGY === 'local';
                if (isUpdate) {
                    isTargetLocalActual = Utils.isAnyBundlePath(originalPath);
                    targetPath = Utils.normalizePath(originalPath);
                    targetFilename = Utils.getBasename(targetPath);
                } else {
                    isTargetLocalActual = isConfigAssetStrategyLocal;
                    targetFilename = isTargetLocalActual ? 'index.md' : `${newSlug}.md`;
                    const baseDir = isTargetLocalActual ? Utils.joinPaths(currentDirectoryPath, newSlug) : currentDirectoryPath;
                    targetPath = Utils.normalizePath(Utils.joinPaths(baseDir, targetFilename));
                }
                return { targetPath, targetFilename, isTargetLocalActual };
            },
            async identifyResourcesToDelete(filePathToDelete, isBranchBundleIndexDelete, isLeafBundleIndexDelete, initialLinksSet, userSettings, gitHubService) {
                const allPathsToDelete = new Set();
                const addPathToDelete = (p) => { if (p) allPathsToDelete.add(Utils.normalizePath(p)); };
                if (isBranchBundleIndexDelete) {
                    UIManager.updateStatus(i18next.t('statusBar.identifyingBranchIndexResources', { filePath: filePathToDelete }), false, false, true);
                    addPathToDelete(filePathToDelete);
                    UIManager.updateStatus(i18next.t('statusBar.markedFileForDeletion', { filename: Utils.getBasename(filePathToDelete) }), false, false, true);
                    if (initialLinksSet?.size > 0) {
                        UIManager.updateStatus(i18next.t('statusBar.checkingAssocImages'), false, false, true);
                        let assetCount = 0;
                        initialLinksSet.forEach(assetPath => { addPathToDelete(assetPath); UIManager.updateStatus(i18next.t('statusBar.deletingUnusedImage', { image: Utils.getBasename(assetPath) }), false, false, true); assetCount++; });
                        UIManager.updateStatus(i18next.t('statusBar.imageCleanupSuccess', { count: assetCount }), false, assetCount > 0);
                    } else {
                        UIManager.updateStatus(i18next.t('statusBar.noInitialLinksFound'), false, false);
                    }
                } else if (isLeafBundleIndexDelete) {
                    const bundleDir = Utils.getDirname(filePathToDelete);
                    if (bundleDir) {
                        UIManager.updateStatus(i18next.t('statusBar.checkingBundleContents', { path: bundleDir }), false, false, true);
                        try {
                            const bundleContents = await gitHubService.getFolderContentsRecursive(bundleDir);
                            if (bundleContents?.length > 0) {
                                bundleContents.forEach(item => addPathToDelete(item.path));
                                UIManager.updateStatus(i18next.t('statusBar.bundleContentsIdentified', { count: bundleContents.length, path: bundleDir }), false, true);
                            } else if (bundleContents === null) {
                                const msg = i18next.t('statusBar.bundleContentsCheckFailed', { path: bundleDir, message: "Folder not found or empty during deletion prep." });
                                this.handleGenericError(new Error(msg), msg, "Delete Preparation");
                                addPathToDelete(filePathToDelete);
                            } else {
                                UIManager.updateStatus(i18next.t('statusBar.bundleContentsIdentified', { count: 0, path: bundleDir }), false, true);
                                addPathToDelete(filePathToDelete);
                            }
                        } catch (error) {
                            const msgKey = 'errors.bundleContentsCheckFailed';
                            this.handleGenericError(error, i18next.t(msgKey, { path: bundleDir, message: error.message }), "Delete Preparation");
                            throw new Error(i18next.t('errors.deleteBundleException', { path: bundleDir }));
                        }
                    }
                    addPathToDelete(filePathToDelete);
                } else {
                    addPathToDelete(filePathToDelete);
                    const unusedAssetPaths = await this.getFilesToDeleteBasedOnLinks(new Set(), initialLinksSet);
                    if (unusedAssetPaths.length > 0) {
                        UIManager.updateStatus(i18next.t('statusBar.cleaningImages', { count: unusedAssetPaths.length }), false, false, true);
                        unusedAssetPaths.forEach(p => { addPathToDelete(p); UIManager.updateStatus(i18next.t('statusBar.deletingUnusedImage', { image: Utils.getBasename(p) }), false, false, true); });
                        UIManager.updateStatus(i18next.t('statusBar.imageCleanupSuccess', { count: unusedAssetPaths.length }), false, true);
                    } else {
                        UIManager.updateStatus(i18next.t('statusBar.noAssociatedAssetsFound'), false, false);
                    }
                    let globalAssetDirPath = null;
                    if (userSettings.ASSET_STRATEGY === 'global') {
                        const slugToDelete = Utils.getSlugFromFilename(filePathToDelete);
                        const baseBrowsePath = Utils.normalizePath(userSettings.BASE_BROWSE_PATH);
                        const contentDir = Utils.getDirname(filePathToDelete);
                        let contentRelativeDir = '';
                        if (contentDir.startsWith(baseBrowsePath + '/')) contentRelativeDir = contentDir.substring(baseBrowsePath.length + 1);
                        else if (contentDir !== baseBrowsePath && contentDir !== '') contentRelativeDir = contentDir;
                        globalAssetDirPath = Utils.normalizePath(Utils.joinPaths(userSettings.GLOBAL_ROOT_DIR, userSettings.GLOBAL_ASSET_SUBPATH, contentRelativeDir, slugToDelete));
                    }
                    if (globalAssetDirPath) {
                        UIManager.updateStatus(i18next.t('statusBar.deletingLegacyDir', { path: globalAssetDirPath }), false, false, true);
                        try {
                            const globalContents = await gitHubService.getFolderContentsRecursive(globalAssetDirPath);
                            if (globalContents?.length > 0) {
                                globalContents.forEach(item => addPathToDelete(item.path));
                                UIManager.updateStatus(i18next.t('statusBar.legacyDirContentsIdentified', { count: globalContents.length, path: globalAssetDirPath }), false, true);
                            } else if (globalContents === null) { UIManager.updateStatus(i18next.t('statusBar.legacyAssetDirNotFound', { path: globalAssetDirPath }), false, false); }
                            else { UIManager.updateStatus(i18next.t('statusBar.legacyAssetDirEmpty', { path: globalAssetDirPath }), false, false); }
                        } catch (globalError) {
                            this.handleGenericError(globalError, i18next.t('errors.legacyDirCheckFailed', { path: globalAssetDirPath, message: globalError.message }), "Global Asset Deletion Check");
                        }
                    }
                }
                return allPathsToDelete;
            },

            handleFileFilter() {
                if (!this.elements.fileFilterInput || !this.elements.draftFilterCheckbox || !this.elements.fileListUl || !this.elements.fileListEmptyMessage) return;
                const filterText = this.elements.fileFilterInput.value.toLowerCase().trim();
                const showOnlyDrafts = this.elements.draftFilterCheckbox.checked;
                const listItems = this.elements.fileListUl.querySelectorAll('li');
                let visibleCount = 0;
                let hasItemsOtherThanParent = false;
                listItems.forEach(li => {
                    const isParentLink = li.classList.contains('parent-dir');
                    const isErrorOrLoading = li.classList.contains('error') || li.querySelector('em.no-hover');
                    let shouldBeVisible = false;
                    if (!isParentLink && !isErrorOrLoading) {
                        hasItemsOtherThanParent = true;
                    }
                    if (isParentLink) {
                        shouldBeVisible = true;
                    } else if (isErrorOrLoading) {
                        shouldBeVisible = !showOnlyDrafts;
                    } else {
                        const itemNameElement = li.querySelector('.file-item-name');
                        const itemName = itemNameElement ? itemNameElement.textContent.toLowerCase() : '';
                        const isDraftItem = !!li.querySelector('.draft-indicator');
                        const matchesName = filterText === '' || itemName.includes(filterText);
                        if (showOnlyDrafts) {
                            shouldBeVisible = isDraftItem && matchesName;
                        } else {
                            shouldBeVisible = matchesName;
                        }
                    }
                    li.style.display = shouldBeVisible ? 'flex' : 'none';
                    if (shouldBeVisible && !isParentLink && !isErrorOrLoading) {
                        visibleCount++;
                    }
                });
                const isFilterActive = filterText !== '' || showOnlyDrafts;
                const showEmptyMessage = isFilterActive && hasItemsOtherThanParent && visibleCount === 0;
                this.elements.fileListEmptyMessage.classList.toggle('hidden', !showEmptyMessage);

            prepareInitialFmDataForState(parsedFrontMatter, filePath) {
                const initialFmData = {};
                FM_FIELD_CONFIG.forEach(field => {
                    const value = parsedFrontMatter[field.key];
                    if (field.type === 'datetime') {
                        let dateString = '';
                        if (value) {
                            try {
                                let dateInput = value;
                                if (typeof dateInput === 'number') dateInput = new Date(dateInput);
                                let parsedDate = dateInput instanceof Date ? dateInput : flatpickr.parseDate(String(dateInput), "Z");
                                if (!parsedDate || isNaN(parsedDate.getTime())) { parsedDate = flatpickr.parseDate(String(dateInput), "Y-m-d H:i:S"); }
                                if (!parsedDate || isNaN(parsedDate.getTime())) { parsedDate = new Date(dateInput); }
                                if (parsedDate && !isNaN(parsedDate.getTime())) dateString = flatpickr.formatDate(parsedDate, "Y-m-d H:i:S");
                                else dateString = String(value);
                            } catch (e) { dateString = String(value); }
                        }
                        initialFmData.dateString = dateString;
                        initialFmData[field.key] = dateString;
                    } else if (field.type === 'array') {
                        initialFmData[field.key] = (Array.isArray(value) ? value : (value ? String(value).split(',').map(t => t.trim()) : [])).filter(t => t).sort();
                    } else {
                        initialFmData[field.key] = value || '';
                    }
                });
                initialFmData.custom = {};
                const standardKeysLower = AppConstants.STANDARD_FM_KEYS.map(k => k.toLowerCase());
                for (const key in parsedFrontMatter) {
                    if (!standardKeysLower.includes(key.toLowerCase())) {
                        let initialValue = parsedFrontMatter[key];
                        const lowerInitialValue = String(initialValue).toLowerCase().trim();
                        if (lowerInitialValue === 'true') initialValue = true;
                        else if (lowerInitialValue === 'false') initialValue = false;

                return initialFmData;

            async prepareUploads(markdownBody, postSlug, markdownDirPath, isTargetLocal) {
                const uploadsToCommit = [];
                const urlMap = {};
                const blobUrlRegex = /blob:http[s]?:\/\/[^\s)]+/g;
                const pendingUrlRegex = /pending-upload:blob:http[s]?:\/\/[^\s)]+/g;
                const blobUrlsWithFragments = (markdownBody.match(blobUrlRegex) || [])
                    .concat(markdownBody.match(pendingUrlRegex) || [])
                    .map(url => url.startsWith('pending-upload:') ? url.substring('pending-upload:'.length) : url);
                const uniqueBlobUrlsWithFragments = [...new Set(blobUrlsWithFragments)];
                if (uniqueBlobUrlsWithFragments.length === 0) return { updatedBody: markdownBody, uploadsToCommit, urlMap };
                UIManager.updateStatus(i18next.t('statusBar.uploadingImages', { count: uniqueBlobUrlsWithFragments.length }), false, false, true);
                let updatedBody = markdownBody;
                const normalizedLocalAssetSubdir = Utils.normalizePath(UserSettings.LOCAL_ASSET_SUBDIR);
                for (const blobUrlWithFragment of uniqueBlobUrlsWithFragments) {
                    const cleanBlobUrl = Utils.cleanUrl(blobUrlWithFragment);
                    const lookupKey = cleanBlobUrl.startsWith('pending-upload:') ? cleanBlobUrl.substring('pending-upload:'.length) : cleanBlobUrl;
                    const fileObject = AppState.pendingUploads[lookupKey];
                    if (!fileObject) { console.warn(`No file object found for blob URL key: ${lookupKey} (derived from ${blobUrlWithFragment}). Skipping preparation.`); continue; }
                    UIManager.updateStatus(i18next.t('statusBar.uploadingImage', { filename: fileObject.name }), false, false, true);
                    try {
                        let fragment = '';
                        const fragmentIndex = blobUrlWithFragment.indexOf('#');
                        const queryIndex = blobUrlWithFragment.indexOf('?');
                        let separatorIndex = Math.min(fragmentIndex === -1 ? Infinity : fragmentIndex, queryIndex === -1 ? Infinity : queryIndex);
                        if (separatorIndex !== Infinity) fragment = blobUrlWithFragment.substring(separatorIndex);
                        const safeOriginalName = Utils.sanitizeFilename(fileObject.name);
                        const parts = safeOriginalName.split('.'); const ext = parts.length > 1 ? '.' + parts.pop() : ''; const baseName = parts.join('.');
                        const shortId = Utils.generateRandomId(); const uniqueFilename = `${baseName}.${shortId}${ext}`;
                        let githubFilePath, finalPathForMarkdown;
                        if (isTargetLocal) {
                            githubFilePath = Utils.normalizePath(Utils.joinPaths(markdownDirPath, normalizedLocalAssetSubdir, uniqueFilename));
                            finalPathForMarkdown = normalizedLocalAssetSubdir ? Utils.joinPaths(normalizedLocalAssetSubdir, uniqueFilename) : uniqueFilename;
                        } else {
                            const normalizedGlobalRootDir = Utils.normalizePath(UserSettings.GLOBAL_ROOT_DIR);
                            const normalizedGlobalAssetSubpath = Utils.normalizePath(UserSettings.GLOBAL_ASSET_SUBPATH);
                            const baseBrowsePath = Utils.normalizePath(UserSettings.BASE_BROWSE_PATH);
                            const normalizedMarkdownDir = Utils.normalizePath(markdownDirPath);
                            let subFolderPath = '';
                            if (normalizedMarkdownDir.startsWith(baseBrowsePath) && normalizedMarkdownDir.length > baseBrowsePath.length && normalizedMarkdownDir !== baseBrowsePath) {
                                subFolderPath = normalizedMarkdownDir.substring(baseBrowsePath.length + 1);
                            }
                            githubFilePath = Utils.normalizePath(Utils.joinPaths(normalizedGlobalRootDir, normalizedGlobalAssetSubpath, subFolderPath, postSlug, uniqueFilename));
                            if (UserSettings.OMIT_GLOBAL_ROOT_DIR_FROM_URL) {
                                finalPathForMarkdown = '/' + Utils.normalizePath(Utils.joinPaths(normalizedGlobalAssetSubpath, subFolderPath, postSlug, uniqueFilename));
                            } else {
                                finalPathForMarkdown = '/' + Utils.normalizePath(Utils.joinPaths(normalizedGlobalRootDir, normalizedGlobalAssetSubpath, subFolderPath, postSlug, uniqueFilename));
                            }
                            finalPathForMarkdown = finalPathForMarkdown.replace(/\/\/+/g, '/');
                        }
                        const fileContent = await Utils.readFileAsBase64(fileObject);
                        uploadsToCommit.push({ path: githubFilePath, content: fileContent, encoding: 'base64' });
                        urlMap[lookupKey] = finalPathForMarkdown;
                        const finalLinkWithFragment = finalPathForMarkdown + fragment;
                        const escapedOriginalBlobUrl = blobUrlWithFragment.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
                        const imageRegex = new RegExp(`(!?\\[[^\\]]*\\]\\()${escapedOriginalBlobUrl}(\\)?)`, 'g');
                        const fileRegexBase = blobUrlWithFragment.startsWith('pending-upload:') ? blobUrlWithFragment : `pending-upload:${blobUrlWithFragment}`;
                        const escapedFileRegexBase = fileRegexBase.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
                        const fileRegex = new RegExp(`(\\[[^\\]]*\\]\\()${escapedFileRegexBase}(\\)?)`, 'g');
                        updatedBody = updatedBody.replace(imageRegex, `$1${finalLinkWithFragment}$2`);
                        updatedBody = updatedBody.replace(fileRegex, `$1${finalLinkWithFragment}$2`);
                    } catch (error) {
                        const msgKey = 'errors.imageUploadFailed';
                        this.handleGenericError(error, i18next.t(msgKey, { filename: fileObject.name, message: error.message || 'Unknown error' }), "Upload Preparation");
                        throw new Error(i18next.t('errors.imageUploadFailedGenericWithMessage', { message: error.message || 'Unknown error' }));
                    }
                }
                UIManager.updateStatus(i18next.t('statusBar.uploadComplete', { count: uploadsToCommit.length }), false, true);
                return { updatedBody, uploadsToCommit, urlMap };
            },
            async getFilesToDeleteBasedOnLinks(currentLinksSet, initialLinksSet) {
                if (!initialLinksSet || initialLinksSet.size === 0) return [];
                const pathsToDelete = new Set();
                for (const initialLinkPath of initialLinksSet) {
                    if (!currentLinksSet.has(initialLinkPath)) {
                        pathsToDelete.add(initialLinkPath);
                    }
                }
                return Array.from(pathsToDelete);
            },
            async executeCommit(commitMessage, filesToCommit, filesToDeletePaths) {
                try {
                    UIManager.updateStatus(i18next.t('statusBar.creatingBlobs', { count: filesToCommit.length }), false, false, true);
                    const blobPromises = filesToCommit.map(file =>
                        GitHubService.createBlob(file.content, file.encoding || 'utf-8').then(result => {
                            if (!result.success) throw result.error; return { path: file.path, sha: result.sha, mode: '100644', type: 'blob' };
                        }).catch(error => { throw new Error(`Blob creation failed for ${file.path}: ${error.message}`); })
                    );
                    const blobResults = await Promise.all(blobPromises);
                    UIManager.updateStatus(i18next.t('statusBar.creatingTree'), false, false, true);
                    const refResult = await GitHubService.getRef();
                    if (!refResult.success) throw refResult.error;
                    const parentCommitSha = refResult.sha;
                    const commitResult = await GitHubService.getCommit(parentCommitSha);
                    if (!commitResult.success) throw commitResult.error;
                    const baseTreeSha = commitResult.treeSha;
                    const treeDefinition = blobResults.map(blob => ({ path: blob.path, mode: blob.mode, type: blob.type, sha: blob.sha }));
                    filesToDeletePaths.forEach(path => { treeDefinition.push({ path: path, mode: '100644', type: 'blob', sha: null }); });
                    const treeResult = await GitHubService.createTree(baseTreeSha, treeDefinition);
                    if (!treeResult.success) throw treeResult.error;
                    const newTreeSha = treeResult.sha;
                    UIManager.updateStatus(i18next.t('statusBar.creatingCommit'), false, false, true);
                    const newCommitResult = await GitHubService.createCommit(newTreeSha, parentCommitSha, commitMessage);
                    if (!newCommitResult.success) throw newCommitResult.error;
                    const newCommitSha = newCommitResult.sha;
                    UIManager.updateStatus(i18next.t('statusBar.updatingRef'), false, false, true);
                    const updateRefResult = await GitHubService.updateRef(newCommitSha);
                    if (!updateRefResult.success) throw updateRefResult.error;
                    return { success: true, commitSha: newCommitSha };
                } catch (error) {
                    let step = 'Unknown';
                    if (error.message?.includes('Blob creation failed')) step = 'Blob Creation';
                    else if (error.message?.includes('getRef')) step = 'Get Reference';
                    else if (error.message?.includes('getCommit')) step = 'Get Commit';
                    else if (error.message?.includes('createTree')) step = 'Tree Creation';
                    else if (error.message?.includes('createCommit')) step = 'Commit Creation';
                    else if (error.message?.includes('updateRef')) step = 'Update Reference';
                    this.handleApiError(error, i18next.t('errors.commitFailed', { step: step }), { step: step });
                    return { success: false, error, step };
                }
            },
            validateSaveInputs(formData) {
                if (!formData.title) {
                    this.handleGenericError(new Error("Validation Error: Title missing"), 'errors.titleRequired', "Save Validation");
                    this.elements.fmTitleInput.focus();
                    return false;
                }
                const isPathInvalid = !formData.fullPathValue || (!formData.fullPathValue.endsWith('.md') && !Utils.isAnyBundlePath(formData.fullPathValue)) || (Utils.isAnyBundlePath(formData.fullPathValue) && !formData.slugOrFilename) || formData.fullPathValue.includes('//') || formData.fullPathValue.startsWith('/');
                if (isPathInvalid) {
                    this.handleGenericError(new Error("Validation Error: Invalid filename/path"), 'errors.invalidFilename', "Save Validation");
                    this.elements.fileNameInput.focus();
                    return false;
                }
                UIManager.updateCommitMessage();
                formData.commitMessage = formData.commitMessage || this.elements.commitMessageInput.value.trim();
                if (!formData.commitMessage) {
                    this.handleGenericError(new Error("Validation Error: Commit message required"), 'errors.commitMsgRequired', "Save Validation");
                    this.elements.commitMessageInput.focus();
                    return false;
                }
                if (!this.validateCustomFields()) {
                    return false;
                }
                return true;
            },
            validateCustomFields() {
                const customKeyInputs = this.elements.customFrontMatterContainer.querySelectorAll('.custom-fm-key');
                const customKeys = [];
                const standardKeysLower = AppConstants.STANDARD_FM_KEYS.map(k => k.toLowerCase());
                const seenKeys = new Set();
                for (const keyInput of customKeyInputs) {
                    const key = keyInput.value.trim();
                    const keyLower = key.toLowerCase();
                    if (!key) continue;
                    if (standardKeysLower.includes(keyLower)) {
                        const message = i18next.t('errors.customKeyConflictSaveBlock', { key: key });
                        this.handleGenericError(new Error(message), message, "Custom Field Validation");
                        try { keyInput.focus(); } catch (e) { console.warn("Focus failed", e); }
                        return false;
                    }
                    customKeys.push({ key: key, element: keyInput });
                }
                for (const { key, element } of customKeys) {
                    const keyLower = key.toLowerCase();
                    if (seenKeys.has(keyLower)) {
                        const message = i18next.t('errors.customKeyDuplicate', { key: key });
                        this.handleGenericError(new Error(message), message, "Custom Field Validation");
                        try { element.focus(); } catch (e) { console.warn("Focus failed", e); }
                        return false;
                    }
                    seenKeys.add(keyLower);
                }
                return true;
            },
            getValidatedDateISO(formData) {
                let currentDate;
                try {
                    if (AppState.flatpickrInstance && AppState.flatpickrInstance.selectedDates.length > 0) {
                        currentDate = AppState.flatpickrInstance.selectedDates[0];
                    } else if (formData.dateString) {
                        let parsedDate = flatpickr.parseDate(formData.dateString, "Y-m-d H:i:S") || new Date(formData.dateString.replace(' ', 'T')) || new Date(formData.dateString);
                        if (!parsedDate || isNaN(parsedDate.getTime())) throw new Error("Invalid date format");
                        currentDate = parsedDate;
                    } else {
                        currentDate = new Date();
                        UIManager.updateStatus(i18next.t('statusBar.dateSetToNow'), false);
                    }
                    this.elements.fmDateInput.value = flatpickr.formatDate(currentDate, "Y-m-d H:i:S");
                    return currentDate.toISOString();
                } catch (e) {
                    this.handleGenericError(e, 'errors.invalidDate', "Date Validation");
                    this.elements.fmDateInput.focus();
                    return null;
                }
            },
            prepareFrontMatterForSave(formData, dateValueISO, saveType, isUpdate) {
                const frontMatterData = { custom: formData.custom };
                FM_FIELD_CONFIG.forEach(field => {
                    if (formData[field.key] !== undefined) {
                        if (field.type === 'array') {
                            if (formData[field.key].length > 0) {
                                frontMatterData[field.key] = formData[field.key];
                            }
                        } else if (field.type === 'datetime') {
                        } else if (formData[field.key] !== '') {
                            frontMatterData[field.key] = formData[field.key];
                        }
                    }
                });
                let finalDateISO;
                if (!isUpdate) {
                    finalDateISO = (saveType === 'publish') ? new Date().toISOString() : dateValueISO;
                    frontMatterData.draft = saveType === 'draft' ? true : undefined;
                } else if (AppState.initialDraftState) {
                    finalDateISO = (saveType === 'publish') ? new Date().toISOString() : dateValueISO;
                    frontMatterData.draft = saveType === 'draft' ? true : undefined;
                } else {
                    const originalDateISO = AppState.initialFmData.dateString ? new Date(AppState.initialFmData.dateString.replace(' ', 'T')).toISOString() : dateValueISO;
                    finalDateISO = (saveType === 'draft') ? dateValueISO : originalDateISO;
                    frontMatterData.draft = saveType === 'draft' ? true : undefined;
                    if (saveType === 'publish') frontMatterData.lastmod = new Date().toISOString();
                }
                frontMatterData.date = finalDateISO;
                if (frontMatterData.draft === undefined) delete frontMatterData.draft;
                if (frontMatterData.lastmod === undefined) delete frontMatterData.lastmod;
                return frontMatterData;
            },
            getSaveOperationTypeKey(saveType, isUpdate) {
                if (!isUpdate) return saveType === 'publish' ? 'statusBar.opPublishNew' : 'statusBar.opCreateDraft';
                if (AppState.initialDraftState) return saveType === 'publish' ? 'statusBar.opPublishUpdate' : 'statusBar.opUpdateDraft';
                return saveType === 'draft' ? 'statusBar.opRevertToDraft' : 'statusBar.opUpdatePublished';
            },
            async saveFile(saveType) {
                if (!AppState.octokit) { this.handleLogout(); return; }
                UIManager.setEditorSaving(true);
                const formData = await UIManager.getEditorFormData();
                if (!this.validateSaveInputs(formData)) { UIManager.setEditorSaving(false); return; }
                const dateValueISO = this.getValidatedDateISO(formData);
                if (!dateValueISO) { UIManager.setEditorSaving(false); return; }
                const isUpdate = !!AppState.currentFileSha;
                const newSlug = formData.slugOrFilename;
                const originalPath = AppState.currentFilePath ? Utils.normalizePath(AppState.currentFilePath) : null;
                const { targetPath, isTargetLocalActual } = this.determineSaveTarget(isUpdate, newSlug, originalPath, AppState.currentPath, UserSettings);
                const markdownDirPath = Utils.getDirname(targetPath);
                let uploadsToCommit = [];
                let markdownWithUploadsProcessed = formData.body;
                try {
                    const uploadPrepResult = await this.prepareUploads(formData.body, newSlug, markdownDirPath, isTargetLocalActual);
                    markdownWithUploadsProcessed = uploadPrepResult.updatedBody;
                    uploadsToCommit = uploadPrepResult.uploadsToCommit;
                } catch (error) {
                    UIManager.setEditorSaving(false);
                    return;
                }
                let finalMarkdownForSave = markdownWithUploadsProcessed;
                let filesToDeletePaths = [];
                if (isUpdate && originalPath) {
                    const initialUploadLinks = AppState.initialUploadLinks;
                    const finalUploadLinks = this.parseManagedUploadLinks(finalMarkdownForSave, targetPath);
                    const unusedAssetPaths = await this.getFilesToDeleteBasedOnLinks(finalUploadLinks, initialUploadLinks);
                    filesToDeletePaths.push(...unusedAssetPaths);
                    filesToDeletePaths = [...new Set(filesToDeletePaths.filter(p => p))];
                }
                const finalFrontMatterData = this.prepareFrontMatterForSave(formData, dateValueISO, saveType, isUpdate);
                const operationTypeKey = this.getSaveOperationTypeKey(saveType, isUpdate);
                const operationType = i18next.t(operationTypeKey);
                let finalContent;
                try { finalContent = Utils.formatFrontMatterAndBody(finalFrontMatterData, finalMarkdownForSave); }
                catch (formatError) { UIManager.setEditorSaving(false); return; }
                const filesToCommit = [...uploadsToCommit, { path: targetPath, content: finalContent, encoding: 'utf-8' }];
                UIManager.updateStatus(i18next.t('statusBar.saving', { path: targetPath, operation: operationType }), false, false, true);
                try {
                    const commitResult = await this.executeCommit(formData.commitMessage, filesToCommit, filesToDeletePaths);
                    if (commitResult.success) {
                        const commitShaShort = commitResult.commitSha?.substring(0, 7) || 'N/A';
                        let successMsgKey = 'statusBar.saveSuccess';
                        let successMsgOptions = { path: targetPath, operation: operationType, commitSha: commitShaShort };
                        UIManager.updateStatus(i18next.t(successMsgKey, successMsgOptions), false, true, false);
                        const normalizedTargetPath = Utils.normalizePath(targetPath);
                        const isNowDraft = finalFrontMatterData.draft === true;
                        if (isNowDraft) { AppState.draftPathsSet.add(normalizedTargetPath); console.log(`Local draft state: Added ${normalizedTargetPath}.`); }
                        else { AppState.draftPathsSet.delete(normalizedTargetPath); console.log(`Local draft state: Removed ${normalizedTargetPath}.`); }
                        this.setBaseTag(null);
                        UIManager.removeActiveFileHighlight();
                        AppState.clearPendingUploads(); AppState.clearEditingFile();
                        UIManager.setBrowseOnlyState();
                        UIManager.updateStatus(i18next.t('statusBar.refreshingList'), false, false, true);
                        await Utils.delay(UserSettings.UI_TRANSITION_DELAY_MS);
                        await this.browsePath(Utils.getDirname(targetPath) || UserSettings.BASE_BROWSE_PATH);
                    } else {
                        UIManager.setEditorSaving(false);
                        UIManager.updateEditorActionButtonsState();
                    }
                } catch (error) {
                    UIManager.setEditorSaving(false);
                    this.handleGenericError(error, 'errors.saveException', "Save File");
                    UIManager.updateEditorActionButtonsState();
                }
            },
            confirmDeletion(filePathToDelete) {
                const isBranchBundleIndex = Utils.isBranchBundlePath(filePathToDelete);
                const isLeafBundleIndex = Utils.isPageBundlePath(filePathToDelete);
                const resourceNameToDelete = (isBranchBundleIndex || isLeafBundleIndex) ? Utils.getBasename(Utils.getDirname(filePathToDelete)) : Utils.getBasename(filePathToDelete);
                let confirmMsgKey;
                let confirmOptions = { filename: Utils.getBasename(filePathToDelete), bundleName: Utils.getDirname(filePathToDelete) };
                if (isBranchBundleIndex) confirmMsgKey = 'prompts.confirmDeleteBranchBundleIndex';
                else if (isLeafBundleIndex) confirmMsgKey = 'prompts.confirmDeleteBundle';
                else confirmMsgKey = 'prompts.confirmDelete';
                const detailMsg = i18next.t('prompts.confirmDeleteDetail');
                return confirm(`${i18next.t(confirmMsgKey, confirmOptions)}\n\n${detailMsg}`);
            },
            getDeleteCommitMessage(resourceNameToDelete) {
                const commitMessage = i18next.t('commit.delete', { path: resourceNameToDelete });
                this.elements.commitMessageInput.value = commitMessage;
                if (!commitMessage) {
                    this.handleGenericError(new Error("Validation Error: Commit message required"), 'errors.commitMsgRequired', "Delete Commit Message");
                    this.elements.commitMessageInput.focus();
                    return null;
                }
                return commitMessage;
            },
            async deleteFile() {
                if (!AppState.octokit) { this.handleLogout(); return; }
                if (!AppState.currentFilePath || !AppState.currentFileSha) { this.handleGenericError(new Error("No file loaded"), 'errors.noFileToDelete', "Delete File"); return; }
                const filePathToDelete = AppState.currentFilePath;
                if (!this.confirmDeletion(filePathToDelete)) { UIManager.updateStatus(i18next.t('prompts.deleteCancelled'), false); return; }
                const isBranchBundleIndex = Utils.isBranchBundlePath(filePathToDelete);
                const isLeafBundleIndex = Utils.isPageBundlePath(filePathToDelete);
                const resourceNameToDelete = (isBranchBundleIndex || isLeafBundleIndex) ? Utils.getBasename(Utils.getDirname(filePathToDelete)) : Utils.getBasename(filePathToDelete);
                const commitMessage = this.getDeleteCommitMessage(resourceNameToDelete);
                if (!commitMessage) return;
                UIManager.setEditorSaving(true);
                const statusMsgKey = isBranchBundleIndex ? 'statusBar.deletingBranchIndex' : (isLeafBundleIndex ? 'statusBar.deletingBundle' : 'statusBar.deleting');
                UIManager.updateStatus(i18next.t(statusMsgKey, { path: resourceNameToDelete }), false, false, true);
                let filesToDeletePaths = [];
                try {
                    const pathsToDeleteSet = await this.identifyResourcesToDelete(filePathToDelete, isBranchBundleIndex, isLeafBundleIndex, AppState.initialUploadLinks, UserSettings, GitHubService);
                    filesToDeletePaths = Array.from(pathsToDeleteSet).filter(p => p);
                    if (filesToDeletePaths.length === 0) { console.warn("No files identified for deletion for:", filePathToDelete); throw new Error("Could not identify any files to delete."); }
                } catch (error) { UIManager.setEditorSaving(false); this.handleGenericError(error, 'errors.deleteException', "Delete Preparation"); return; }
                try {
                    const commitResult = await this.executeCommit(commitMessage, [], filesToDeletePaths);
                    if (commitResult.success) {
                        const commitShaShort = commitResult.commitSha?.substring(0, 7) || 'N/A';
                        const successMsgKey = isBranchBundleIndex ? 'statusBar.deleteBranchIndexSuccess' : 'statusBar.deleteSuccess';
                        UIManager.updateStatus(i18next.t(successMsgKey, { path: resourceNameToDelete, commitSha: commitShaShort }), false, true, false);
                        const normalizedFilePathToDelete = Utils.normalizePath(filePathToDelete);
                        AppState.draftPathsSet.delete(normalizedFilePathToDelete);
                        console.log(`Local draft state: Removed ${normalizedFilePathToDelete} due to deletion.`);
                        if (isLeafBundleIndex) {
                            const bundleDirPrefix = Utils.getDirname(normalizedFilePathToDelete) + '/';
                            const pathsToRemove = [];
                            AppState.draftPathsSet.forEach(path => { if (path.startsWith(bundleDirPrefix)) { pathsToRemove.push(path); } });
                            pathsToRemove.forEach(path => { AppState.draftPathsSet.delete(path); console.log(`Local draft state: Also removed ${path} as part of bundle deletion.`); });
                        }
                        this.setBaseTag(null);
                        UIManager.removeActiveFileHighlight();
                        AppState.clearEditingFile();
                        UIManager.setBrowseOnlyState();
                        UIManager.updateStatus(i18next.t('statusBar.navigatingParent'), false, false, true);
                        await Utils.delay(UserSettings.UI_TRANSITION_DELAY_MS);
                        let pathToShowAfterDelete;
                        const normalizedBasePath = Utils.normalizePath(UserSettings.BASE_BROWSE_PATH);
                        const currentDir = Utils.getDirname(filePathToDelete);
                        if (isBranchBundleIndex || isLeafBundleIndex) pathToShowAfterDelete = Utils.getDirname(currentDir) || normalizedBasePath;
                        else pathToShowAfterDelete = currentDir || normalizedBasePath;
                        const normalizedPathToShow = Utils.normalizePath(pathToShowAfterDelete);
                        if (normalizedPathToShow !== normalizedBasePath && !normalizedPathToShow.startsWith(normalizedBasePath + '/')) {
                            console.warn(`Calculated parent path '${normalizedPathToShow}' is outside base path '${normalizedBasePath}'. Falling back to base path.`);
                            pathToShowAfterDelete = normalizedBasePath;
                        }
                        await this.browsePath(Utils.normalizePath(pathToShowAfterDelete));
                    } else {
                        UIManager.setEditorSaving(false);
                    }
                } catch (error) {
                    UIManager.setEditorSaving(false);
                    this.handleGenericError(error, 'errors.deleteException', "Delete Commit");
                }
            },
            async cancelEdit() {
                if (!AppState.octokit) { this.handleLogout(); return; }
                let hasChanges = false;
                if (VditorManager.isReady) {
                    try {
                        const formData = await UIManager.getEditorFormData();
                        hasChanges = AppState.isModified(formData);
                    } catch (e) {
                        this.handleGenericError(e, "Error checking for modifications", "Cancel Edit");
                        hasChanges = true;
                    }
                }
                let confirmed = hasChanges ? confirm(i18next.t('prompts.confirmCancel')) : true;
                if (confirmed) {
                    UIManager.setEditorSaving(true);
                    UIManager.updateStatus(i18next.t('statusBar.cancelled'), false, false, true);
                    const pathBeforeCancel = AppState.currentPath || UserSettings.BASE_BROWSE_PATH;
                    UIManager.removeActiveFileHighlight();
                    await Utils.delay(UserSettings.UI_TRANSITION_DELAY_MS / 2);
                    AppState.clearEditingFile();
                    UIManager.clearEditorFields();
                    UIManager.setBrowseOnlyState();
                    UIManager.setEditorSaving(false);
                    await this.browsePath(pathBeforeCancel);
                } else {
                    UIManager.updateStatus(i18next.t('prompts.cancelAbort'));
                }
            },
        };
        document.addEventListener('DOMContentLoaded', () => {
            try {
                if (typeof App !== 'undefined' && typeof App.init === 'function') App.init();
                else { throw new Error("App object or init function not found."); }
            } catch (error) {
                console.error("App init failed:", error);
                const sb = document.getElementById('statusBar');
                if (sb) { sb.textContent = resources.en.translation['errors.appInit']; sb.classList.add('status-bar-error'); }
                document.body.innerHTML = `<h1 style="color: red;">${resources.en.translation['errors.appLoad']}</h1><p>${resources.en.translation['errors.scriptError']}</p><p>${error.message}</p>`;
            }
        });
    </script></body></html>
